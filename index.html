<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="css/style.css" />

    <title>Daniel Toledo - Keychain</title>
  </head>
  <body>
    <div class="container">
      <div class="text-center">
        <img
          src="assets/card-design.png"
          alt="Fondo decorativo"
          class="bg-pattern animar-entrada retraso-0"
        />

        <img
          src="assets/daniel-foto-perfil.jpeg"
          alt="Foto de Daniel Toledo"
          class="profile-pic animar-entrada retraso-1"
        />
      </div>
      <div class="px-4 mt-2">
        <h1 class="fw-bold text-black name-title animar-entrada retraso-2">
          Daniel<br />Toledo Larrain
        </h1>
<!-- 
        <h2 class="fw-bold job-title mt-3 animar-entrada retraso-3">
          Supply Chain<br />Planner at <u>IASA</u> <br>
        </h2> -->
      </div>
    </div>
    
    <div class="px-4 mt-4 pb-5">
      <div class="card custom-card border-0 shadow animar-entrada retraso-4">
        <div class="card-body p-4 text-center">
          <p class="fs-5 fw-bold mb-4 card-message">
            ¡Hola! Este llavero me pertenece. Si lo encontraste, usa los botones
            abajo.
          </p>

          <div class="d-flex justify-content-center gap-5">
            <a
              href="https://wa.me/59179053467?text=Hola,%20Encontré%20tu%20llavero."
              target="_blank"
              rel="noopener noreferrer"
              class="icon-action text-decoration-none"
            >
              <img
                src="assets/whatsapp.png"
                alt="Icono WhatsApp"
                class="contact-icon"
              />
              <span class="d-block mt-2 icon-text">WhatsApp</span>
            </a>

            <a href="tel:79053467" class="icon-action text-decoration-none">
              <img
                src="assets/phone-call.png"
                alt="Icono Llamar"
                class="contact-icon"
              />
              <span class="d-block mt-2 icon-text">Llámame</span>
            </a>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
